name: structurescan_app
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  # Core Flutter & Supabase
  flutter:
    sdk: flutter
  supabase_flutter: ^2.9.1
  flutter_localizations:
    sdk: flutter
  
  # UI & Icons
  cupertino_icons: ^1.0.8
  
  # Formatting & Localization
  intl: any
  
  # Image handling
  image_picker: ^1.0.7
  image: ^4.1.3
  
  # Environment variables
  flutter_dotenv: ^5.1.0
  
  # HTTP & AI Integration
  http: ^1.2.0
  google_generative_ai: ^0.4.0
  
  # Storage
  path_provider: ^2.1.1
  
  # Markdown rendering
  flutter_markdown: ^0.6.18
  
  # PDF Generation
  pdf: ^3.11.1
  printing: ^5.13.2
  
  # Sharing functionality
  share_plus: ^10.0.2
  
  # Maps and Geolocation
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  geolocator: ^12.0.0
  geocoding: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - .env
